<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>1HO Deal Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* ============ 1HO PALETTE ============ */
:root{
  --navy:#0E3E54; --teal:#1d6b8a; --coral:#F08080; --sky:#30A0D0;
  --peach:#F0C980; --cream:#f5f3ef;
  --green:#22C55E; --red:#EF4444; --cyan:#40E0D0; --magenta:#E93FD3;
  --ink:#111; --line:#d9d4cb;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Archivo',sans-serif;font-weight:400;background:var(--cream);color:var(--ink);min-height:100vh}

/* ============ PASSWORD GATE ============ */
#gate{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:1000}
#gate .box{background:var(--cream);border-radius:14px;padding:36px 32px;width:min(360px,90vw);text-align:center}
#gate h1{font-weight:800;font-size:22px;color:var(--navy);margin-bottom:4px;letter-spacing:-.02em}
#gate p{font-size:13px;color:#666;margin-bottom:18px}
#gate input{width:100%;padding:12px 14px;border:2px solid var(--line);border-radius:8px;font:inherit;font-size:15px;margin-bottom:12px}
#gate input:focus{outline:none;border-color:var(--sky)}
#gate button{width:100%;padding:12px;border:none;border-radius:8px;background:var(--navy);color:#fff;font:inherit;font-weight:700;font-size:15px;cursor:pointer}
#gate .err{color:var(--red);font-size:13px;font-weight:700;margin-top:10px;display:none}

/* ============ HEADER ============ */
header{background:var(--navy);color:#fff;padding:18px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header h1{font-weight:800;font-size:20px;letter-spacing:-.02em}
header .sub{font-size:12px;opacity:.75}
header .spacer{flex:1}
.btn{border:none;border-radius:8px;padding:10px 18px;font:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:transform .06s}
.btn:active{transform:scale(.97)}
.btn-add{background:var(--green);color:#06281a}
.btn-refresh{background:var(--sky);color:#082635}
.btn:focus-visible{outline:3px solid var(--peach)}

/* ============ FILTER BAR ============ */
.filters{display:flex;gap:10px;padding:14px 22px;flex-wrap:wrap;align-items:center;background:#fff;border-bottom:2px solid var(--line)}
.filters input,.filters select{padding:9px 12px;border:2px solid var(--line);border-radius:8px;font:inherit;font-size:14px;background:#fff}
.filters input{min-width:220px;flex:1;max-width:340px}
.filters input:focus,.filters select:focus{outline:none;border-color:var(--sky)}
.cols-wrap{position:relative}
#cols-btn{padding:9px 14px;border:2px solid var(--line);border-radius:8px;font:inherit;font-size:14px;font-weight:700;background:#fff;cursor:pointer;color:var(--navy)}
#cols-btn:hover{border-color:var(--sky)}
#cols-panel{position:absolute;top:calc(100% + 6px);left:0;z-index:800;display:none;background:#fff;border:2px solid var(--navy);border-radius:10px;padding:10px 14px;min-width:190px;box-shadow:0 8px 24px rgba(14,62,84,.2);max-height:60vh;overflow-y:auto}
#cols-panel.open{display:block}
#cols-panel label{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;padding:5px 0;cursor:pointer;white-space:nowrap}
#cols-panel input{accent-color:var(--navy)}
#status-msg{font-size:12px;font-weight:700;color:var(--teal);margin-left:auto}

/* ============ SECTIONS ============ */
main{padding:0 0 60px}
.section-banner{background:#000;color:#fff;font-weight:800;font-size:16px;letter-spacing:.03em;padding:12px 22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;cursor:pointer;user-select:none}
.section-banner .caret{font-size:13px;width:14px;display:inline-block}
.section-banner:hover{background:#1a1a1a}
.section-banner .totals{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.pill{border-radius:6px;padding:4px 12px;font-size:13px;font-weight:800}
.pill-count{background:#fff;color:#000}
.pill-green{background:var(--green);color:#052a15}
.pill-peach{background:var(--peach);color:#4a3000}

.table-wrap{overflow-x:auto;background:#fff}
table{border-collapse:collapse;width:100%;min-width:1080px;font-size:13px}
thead th{background:var(--navy);color:#fff;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;text-align:left;position:sticky;top:0;white-space:nowrap}
tbody td{padding:9px 10px;border-bottom:1px solid #eee;vertical-align:top}
tbody tr:hover{background:#f2f8fb}
tr.cancelled td{color:#b3261e;text-decoration:line-through;background:#fdeceb}
tr.cancelled:hover td{background:#fbdcda}
td.addr{font-weight:700;min-width:190px}
td.seller{min-width:130px}
td.notes{min-width:240px;max-width:360px;font-size:12px;color:#444;white-space:pre-line}
td.num{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
td.date{white-space:nowrap}
td.gross-pos{color:#0e7a3d;font-weight:700}

.chip{display:inline-block;border:none;border-radius:6px;padding:3px 10px;font-weight:800;font-size:11px;letter-spacing:.03em;white-space:nowrap;font-family:inherit;cursor:pointer}
.chip:hover{outline:2px solid var(--sky);outline-offset:1px}
.chip:focus-visible{outline:3px solid var(--peach)}
.chip-editing{padding:2px 6px;border:2px solid var(--sky);border-radius:6px;font:inherit;font-size:12px;font-weight:700;background:#fff}

/* drag & drop */
td.grip{width:26px;cursor:grab;color:#bbb;font-size:15px;text-align:center;user-select:none;padding:9px 4px}
td.grip:hover{color:var(--navy)}
tr.dragging{opacity:.35}
tr.drop-before td{box-shadow:inset 0 3px 0 var(--sky)}
tr.drop-after td{box-shadow:inset 0 -3px 0 var(--sky)}

/* cell notes — Sheets-style corner triangle; right-click / long-press any cell */
td[data-colkey]{position:relative}
td.has-note::after{content:'';position:absolute;top:0;right:0;border-style:solid;border-width:0 9px 9px 0;border-color:transparent var(--peach) transparent transparent}
#note-pop{position:fixed;z-index:950;display:none;background:var(--cream);border:2px solid var(--navy);border-radius:10px;padding:12px;width:280px;box-shadow:0 8px 24px rgba(14,62,84,.25)}
#note-pop.open{display:block}
#note-pop .np-head{font-weight:800;font-size:12px;color:var(--navy);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
#note-pop textarea{width:100%;min-height:70px;font-family:inherit;font-size:12px;border:1px solid var(--line);border-radius:6px;padding:6px 8px;resize:vertical;background:#fff}
#note-pop textarea:focus{outline:none;border-color:var(--sky)}
#note-pop .np-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:8px}
#note-pop button{border:none;border-radius:6px;font:inherit;font-weight:700;font-size:12px;padding:6px 12px;cursor:pointer}
#note-pop .np-save{background:var(--navy);color:#fff}
#note-pop .np-close{background:#e2ded6;color:#333}

/* long-press action menu (touch devices) */
#cell-menu{position:fixed;z-index:960;display:none;background:var(--navy);border-radius:10px;padding:6px;box-shadow:0 8px 24px rgba(0,0,0,.35);gap:6px}
#cell-menu.open{display:flex}
#cell-menu button{border:none;border-radius:7px;background:#fff;color:var(--navy);font:inherit;font-weight:800;font-size:13px;padding:9px 16px;cursor:pointer}
#cell-menu button:active{background:var(--sky);color:#fff}
@media (pointer:coarse){
  td[data-colkey]{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
}

/* inline cell editing */
td.editable{cursor:text}
td.editable:hover{background:#eaf5fb;box-shadow:inset 0 0 0 1px var(--sky)}
td.editable input{width:100%;min-width:90px;font-family:inherit;font-size:13px;padding:4px 6px;border:2px solid var(--sky);border-radius:5px;background:#fff}
td.editable input:focus{outline:none}
td.editable textarea{width:100%;min-width:220px;min-height:76px;font-family:inherit;font-size:12px;padding:5px 7px;border:2px solid var(--sky);border-radius:5px;background:#fff;resize:vertical;color:#000}
td.editable textarea:focus{outline:none}
td.editable select{width:100%;min-width:90px;font-family:inherit;font-size:13px;padding:4px 6px;border:2px solid var(--sky);border-radius:5px;background:#fff;color:#000}
td.editable select:focus{outline:none}
.chip-EMD{background:#E23B57;color:#fff}
.chip-ASSIGNED{background:#e8e8e8;color:#333}
.chip-1HO{background:#F5A623;color:#3d2800}
.chip-MARKET{background:var(--navy);color:#fff}
.chip-NEEDPICS{background:var(--cyan);color:#063a35}
.chip-PRICEDROP{background:var(--red);color:#fff}
.chip-CANCEL{background:#7a1410;color:#fff}
.chip-SOLD,.chip-CLOSED{background:var(--green);color:#052a15}
.chip-default{background:#ddd;color:#333}

.empty{padding:40px 22px;text-align:center;color:#888;font-weight:700}
#loading{padding:60px 22px;text-align:center;font-weight:800;color:var(--navy);font-size:16px}

/* ============ MODAL ============ */
#modal-bg{position:fixed;inset:0;background:rgba(14,62,84,.6);display:none;align-items:flex-start;justify-content:center;z-index:900;overflow-y:auto;padding:40px 14px}
#modal-bg.open{display:flex}
.modal{background:var(--cream);border-radius:14px;width:min(640px,100%);padding:26px 26px 22px}
.modal h2{font-weight:800;font-size:19px;color:var(--navy);margin-bottom:18px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid .full{grid-column:1/-1}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--teal);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:2px solid var(--line);border-radius:8px;font:inherit;font-size:14px;background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--sky)}
.field textarea{resize:vertical;min-height:64px}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-cancel{background:#e2ded6;color:#333}
.btn-save{background:var(--navy);color:#fff}
.btn-save:disabled{opacity:.5;cursor:wait}
#form-msg{font-size:13px;font-weight:700;margin-top:12px;display:none}
#form-msg.ok{color:#0e7a3d;display:block}
#form-msg.err{color:var(--red);display:block}

@media (max-width:640px){
  .grid{grid-template-columns:1fr}
  header h1{font-size:17px}
  .filters input{min-width:140px}
}
@media (prefers-reduced-motion: reduce){ *{transition:none!important} }
</style>
</head>
<body>

<!-- ================= PASSWORD GATE ================= -->
<div id="gate">
  <div class="box">
    <h1>1HO DEAL TRACKER</h1>
    <p>Enter today's password</p>
    <input type="password" id="gate-pass" placeholder="Password" autocomplete="off">
    <button onclick="checkGate()">Enter</button>
    <div class="err" id="gate-err">Wrong password</div>
  </div>
</div>

<header>
  <h1>1HO DEAL TRACKER</h1>
  <span class="sub" id="last-updated"></span>
  <span class="spacer"></span>
  <button class="btn btn-refresh" onclick="loadDeals()">↻ Refresh</button>
  <button class="btn btn-add" onclick="openModal()">＋ Add Deal</button>
</header>

<div class="filters">
  <input type="search" id="f-search" placeholder="Search address, seller, notes…" oninput="render()">
  <select id="f-rep" onchange="render()">
    <option value="">All Reps</option>
    <option>Adam</option><option>Nathan</option><option>Nate</option>
    <option>Davon</option><option>Amanda</option><option>Steven</option>
  </select>
  <select id="f-status" onchange="render()">
    <option value="">All Statuses</option>
    <option>EMD</option><option>ASSIGNED</option><option>1HO</option><option>MARKET</option>
    <option>NEED PICS</option><option>Price Drop</option><option>CANCEL</option>
  </select>
  <div class="cols-wrap">
    <button id="cols-btn">☰ Columns</button>
    <div id="cols-panel"></div>
  </div>
  <span id="status-msg"></span>
</div>

<main>
  <div id="loading">LOADING DEALS…</div>
  <div id="sections"></div>
</main>

<!-- ================= ADD DEAL MODAL ================= -->
<div id="modal-bg">
  <div class="modal">
    <h2>Add Deal — lands under "Deals that need to be Sold"</h2>
    <div class="grid">
      <div class="field"><label>Status</label>
        <select id="d-status">
          <option>MARKET</option><option>EMD</option><option>ASSIGNED</option>
          <option>NEED PICS</option><option>Price Drop</option><option>1HO</option>
        </select>
      </div>
      <div class="field"><label>Lead Source</label>
        <select id="d-source">
          <option>Cold Calling</option><option>Text Blast</option><option>Property Leads</option>
          <option>DealMate</option><option>Referral</option><option>PPL</option><option>Other</option>
        </select>
      </div>
      <div class="field"><label>Deal Type</label>
        <select id="d-type"><option>CASH</option><option>NOV</option><option>Other</option></select>
      </div>
      <div class="field"><label>Title Company</label>
        <input id="d-title" list="title-list" placeholder="Innovative Title">
        <datalist id="title-list">
          <option>Innovative Title</option><option>National Title Experts</option>
          <option>Empora Title</option><option>Stellar Title</option><option>Rounsavall Title</option>
        </datalist>
      </div>
      <div class="field"><label>Sr. ACQ</label>
        <select id="d-sr"><option value=""></option><option>Adam</option><option>Nate</option></select>
      </div>
      <div class="field"><label>Jr. ACQ</label>
        <select id="d-jr"><option value=""></option><option>Davon</option><option>Amanda</option><option>Steven</option></select>
      </div>
      <div class="field full"><label>Property Address</label>
        <input id="d-address" placeholder="1234 Example St, Cleveland OH 44102">
      </div>
      <div class="field full"><label>Seller On Deed</label>
        <input id="d-seller" placeholder="Seller full name / entity">
      </div>
      <div class="field"><label>Lead Date</label><input type="date" id="d-leaddate"></div>
      <div class="field"><label>Contract Signed</label><input type="date" id="d-contract"></div>
      <div class="field"><label>COE</label><input type="date" id="d-coe"></div>
      <div class="field"><label>Price ($)</label><input type="number" id="d-price" placeholder="60000" min="0" step="500"></div>
      <div class="field full"><label>Notes</label>
        <textarea id="d-notes" placeholder="Anything the team needs to know"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-save" id="save-btn" onclick="saveDeal()">Add Deal</button>
    </div>
    <div id="form-msg"></div>
  </div>
</div>

<script>
/* ================================================================
   CONFIG — the only things you edit
   ================================================================ */
const SCRIPT_URL   = 'https://script.google.com/macros/s/AKfycbw5IMD8ULM4pnBrUnhjLadeYIwP0yRNk8iWuap0BiFsDDSmx-9FsiqdbLDzQGob6nTW/exec';
const SCRIPT_TOKEN = 'oho-2026-x7';   // must match CFG.TOKEN in Code.gs
const PASSWORD     = 'oho2026';       // daily team password
const SHOW_MONEY   = true;            // false = hide Gross / Payouts / DISPO / OHO
const AUTO_REFRESH_MIN = 5;

/* ================= PASSWORD GATE (daily expiry) ================= */
function todayStamp(){ const d=new Date(); return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function gateOK(){ return localStorage.getItem('oho_dt_gate') === todayStamp(); }
function checkGate(){
  if(document.getElementById('gate-pass').value === PASSWORD){
    localStorage.setItem('oho_dt_gate', todayStamp());
    document.getElementById('gate').style.display='none';
    loadDeals();
  } else {
    document.getElementById('gate-err').style.display='block';
  }
}
document.getElementById('gate-pass').addEventListener('keydown', e=>{ if(e.key==='Enter') checkGate(); });

/* ================= DATA ================= */
let DATA = null;

async function loadDeals(){
  const msg = document.getElementById('status-msg');
  msg.textContent = 'Refreshing…';
  try{
    const res = await fetch(SCRIPT_URL + '?token=' + encodeURIComponent(SCRIPT_TOKEN));
    const j = await res.json();
    if(j.error) throw new Error(j.error);
    DATA = j;
    document.getElementById('last-updated').textContent = 'Updated ' + j.updated;
    document.getElementById('loading').style.display='none';
    msg.textContent = '';
    populateModalFromSheet();
    render();
  }catch(err){
    document.getElementById('loading').textContent = 'COULD NOT LOAD — check SCRIPT_URL / deployment';
    msg.textContent = 'Load failed';
    console.error(err);
  }
}

/* ================= RENDER ================= */
function money(v){
  if(v === '' || v === null || v === undefined) return '';
  if(typeof v !== 'number') return v;
  return '$' + v.toLocaleString();
}
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function chipClass(status){
  const s = status.toUpperCase().replace(/\s+/g,'');
  if(s.includes('EMD')) return 'chip-EMD';
  if(s.includes('ASSIGN')) return 'chip-ASSIGNED';
  if(s === '1HO') return 'chip-1HO';
  if(s.includes('MARKET')) return 'chip-MARKET';
  if(s.includes('PIC')) return 'chip-NEEDPICS';
  if(s.includes('PRICE')) return 'chip-PRICEDROP';
  if(s.includes('CANCEL')) return 'chip-CANCEL';
  if(s.includes('SOLD')||s.includes('CLOSED')||s.includes('CTC')) return 'chip-SOLD';
  return 'chip-default';
}

function dealMatches(d){
  const q = document.getElementById('f-search').value.trim().toLowerCase();
  const rep = document.getElementById('f-rep').value;
  const st  = document.getElementById('f-status').value;
  if(rep){
    const reps = [d.sr, d.jr].join(' ').toLowerCase();
    const target = rep.toLowerCase() === 'nathan' ? 'nat' : rep.toLowerCase();
    if(!reps.includes(target)) return false;
  }
  if(st && !d.status.toUpperCase().includes(st.toUpperCase())) return false;
  if(q){
    const hay = [d.address,d.seller,d.notes1,d.notes2,d.status,d.title,d.leadSource].join(' ').toLowerCase();
    if(!hay.includes(q)) return false;
  }
  return true;
}

/* ================= COLUMN SYSTEM ================= */
function chipHtml(d){
  return '<button class="chip '+chipClass(d.status)+'" data-row="'+d.row+'" data-address="'+esc(d.address)+'" data-status="'+esc(d.status)+'" title="Click to change status">'+esc(d.status||'—')+'</button>';
}
const COLUMN_DEFS = [
  {key:'STATUS',    label:'Status',              cls:'',            editable:false, render:function(d){return chipHtml(d);}},
  {key:'SR',        label:'Sr. ACQ',             cls:'',            editable:true,  render:function(d){return esc(d.sr);}},
  {key:'JR',        label:'Jr. ACQ',             cls:'',            editable:true,  render:function(d){return esc(d.jr);}},
  {key:'ADDRESS',   label:'Property Address',    cls:'addr',        editable:true,  render:function(d){return esc(d.address);}},
  {key:'SELLER',    label:'Seller',              cls:'seller',      editable:true,  render:function(d){return esc(d.seller);}},
  {key:'TITLE',     label:'Title',               cls:'',            editable:true,  render:function(d){return esc(d.title);}},
  {key:'NOTES1',    label:'Last Updates',        cls:'notes',       editable:true,  render:function(d){return esc([d.notes1,d.notes2].filter(Boolean).join('\n'));}},
  {key:'CONTRACT',  label:'Contract',            cls:'date',        editable:true,  render:function(d){return esc(d.contract);}},
  {key:'DAYS_UC',   label:'UC',                  cls:'num',         editable:false, render:function(d){return esc(d.daysUC);}},
  {key:'COE',       label:'COE',                 cls:'date',        editable:true,  render:function(d){return esc(d.coe);}},
  {key:'PRICE',     label:'Price',               cls:'num',         editable:true,  render:function(d){return money(d.price);}},
  {key:'ASSIGNED',  label:'Assigned',            cls:'num',         editable:true,  render:function(d){return money(d.assigned);}},
  {key:'GROSS',     label:'Gross Profit',        cls:'num gross-pos', money:true, editable:false, render:function(d){return money(d.gross);}},
  {key:'SR_PAYOUT', label:'Sr Pay',              cls:'num', money:true, editable:false, render:function(d){return money(d.srPayout);}},
  {key:'JR_PAYOUT', label:'Jr Pay',              cls:'num', money:true, editable:false, render:function(d){return money(d.jrPayout);}},
  {key:'DISPO',     label:'DISPO',               cls:'num', money:true, editable:false, render:function(d){return money(d.dispo);}},
  {key:'OHO',       label:'OHO',                 cls:'num', money:true, editable:false, render:function(d){return money(d.oho);}}
];
const ACTIVE_COLUMNS = COLUMN_DEFS.filter(function(c){ return SHOW_MONEY || !c.money; });

/* cell colors come from the sheet (conditional formatting rules + manual fills);
   text color auto-picks black/white by background luminance */
function textOn(bg){
  const c = bg.replace('#','');
  const r = parseInt(c.substr(0,2),16), g = parseInt(c.substr(2,2),16), b = parseInt(c.substr(4,2),16);
  return (0.299*r + 0.587*g + 0.114*b) > 128 ? '#111111' : '#ffffff';
}

let hiddenCols = {};
try{ hiddenCols = JSON.parse(localStorage.getItem('oho_dt_hidden_cols') || '{}'); }catch(e){ hiddenCols = {}; }
function saveHiddenCols(){ localStorage.setItem('oho_dt_hidden_cols', JSON.stringify(hiddenCols)); }
function visibleColumns(){ return ACTIVE_COLUMNS.filter(function(c){ return !hiddenCols[c.key]; }); }
function colLabel(c){
  return (DATA && DATA.headers && DATA.headers[c.key]) ? DATA.headers[c.key] : c.label;
}

/* columns menu */
function buildColsPanel(){
  const panel = document.getElementById('cols-panel');
  panel.innerHTML = ACTIVE_COLUMNS.map(function(c){
    return '<label><input type="checkbox" data-colkey="'+c.key+'"'+(hiddenCols[c.key]?'':' checked')+'> '+esc(colLabel(c))+'</label>';
  }).join('');
}

/* sections collapse: year sections before the current year start collapsed */
const sectionToggles = {}; // user overrides, name -> true(collapsed)/false(open)
function isCollapsed(name){
  if(name in sectionToggles) return sectionToggles[name];
  const m = name.trim().match(/^(\d{4})$/);
  return !!(m && Number(m[1]) < new Date().getFullYear());
}
function noteAttrs(d, colKey){
  const n = d.cellNotes && d.cellNotes[colKey];
  return (n ? ' has-note' : '') + '" data-colkey="' + colKey + '"' + (n ? ' title="'+esc(n)+'"' : '');
}
function td(d, colKey, cls, inner, editable, style){
  return '<td class="'+cls+(editable?' editable':'')+noteAttrs(d, colKey)+(style?' style="'+style+'"':'')+'>'+inner+'</td>';
}

function render(){
  if(!DATA) return;
  const host = document.getElementById('sections');
  host.innerHTML = '';

  DATA.sections.forEach(sec=>{
    const deals = sec.deals.filter(dealMatches);
    if(!deals.length) return;

    const grossSum = deals.reduce(function(a,d){
      return a + ((!d.cancelled && typeof d.gross==='number' && isFinite(d.gross)) ? d.gross : 0);
    }, 0);

    let totals = '<span class="pill pill-count">'+deals.length+' deals</span>';
    if(SHOW_MONEY && grossSum) totals += '<span class="pill pill-green">'+money(grossSum)+' gross profit</span>';

    const collapsed = isCollapsed(sec.name);
    const banner = '<div class="section-banner" data-section="'+esc(sec.name)+'">'+
      '<span class="caret">'+(collapsed?'▸':'▾')+'</span>'+esc(sec.name.toUpperCase())+
      '<span class="totals">'+totals+'</span></div>';

    if(collapsed){ host.insertAdjacentHTML('beforeend', banner); return; }

    const cols = visibleColumns();
    const rows = deals.map(d=>{
      const cc = d.cellColors || {};
      return '<tr class="'+(d.cancelled?'cancelled':'')+'" data-row="'+d.row+'" data-address="'+esc(d.address)+'">'+
        '<td class="grip" draggable="true" title="Drag to move row">⠿</td>'+
        cols.map(function(c){
          const bg = cc[c.key];
          const fg = bg ? ((d.cellFonts && d.cellFonts[c.key]) || textOn(bg)) : '';
          const style = bg ? 'background:'+bg+';color:'+fg : '';
          return td(d, c.key, c.cls, c.render(d), c.editable, style);
        }).join('')+
      '</tr>';
    }).join('');

    host.insertAdjacentHTML('beforeend',
      banner+
      '<div class="table-wrap"><table><thead><tr>'+
        '<th></th>'+cols.map(function(c){ return '<th>'+esc(colLabel(c))+'</th>'; }).join('')+
      '</tr></thead><tbody>'+rows+'</tbody></table></div>'
    );
  });

  if(!host.innerHTML) host.innerHTML = '<div class="empty">No deals match your filters.</div>';
}

/* ================= SHARED HELPERS ================= */
function findDeal(row, address){
  let hit = null;
  DATA.sections.forEach(function(sec){
    sec.deals.forEach(function(d){
      if(d.row === row && d.address === address) hit = d;
    });
  });
  return hit;
}
async function postAction(payload, busyText, okText){
  const msg = document.getElementById('status-msg');
  msg.textContent = busyText;
  const res = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify(payload) });
  const j = await res.json();
  if(j.error) throw new Error(j.error);
  msg.textContent = okText;
  setTimeout(function(){ if(msg.textContent === okText) msg.textContent = ''; }, 2500);
  return j;
}
function mdyToISO(mdy){ // m/d/yy → yyyy-mm-dd for date inputs
  const p = String(mdy||'').split('/');
  if(p.length !== 3) return '';
  let y = p[2].length === 2 ? '20'+p[2] : p[2];
  return y+'-'+String(p[0]).padStart(2,'0')+'-'+String(p[1]).padStart(2,'0');
}
function isoToMDY(iso){
  if(!iso) return '';
  const p = iso.split('-');
  return parseInt(p[1])+'/'+parseInt(p[2])+'/'+p[0].slice(2);
}

/* ================= INLINE CELL EDITING ================= */
const EDIT_TYPES = { ADDRESS:'text', SELLER:'text', SR:'text', JR:'text', TITLE:'text', NOTES1:'textarea', CONTRACT:'date', COE:'date', PRICE:'number', ASSIGNED:'number' };
function cellValue(deal, colKey){
  switch(colKey){
    case 'ADDRESS':  return deal.address;
    case 'SELLER':   return deal.seller;
    case 'SR':       return deal.sr;
    case 'JR':       return deal.jr;
    case 'TITLE':    return deal.title;
    case 'NOTES1':   return deal.notes1;
    case 'CONTRACT': return mdyToISO(deal.contract);
    case 'COE':      return mdyToISO(deal.coe);
    case 'PRICE':    return typeof deal.price === 'number' ? deal.price : '';
    case 'ASSIGNED': return typeof deal.assigned === 'number' ? deal.assigned : '';
  }
  return '';
}

document.getElementById('sections').addEventListener('click', function(e){
  const cell = e.target.closest('td.editable');
  if(!cell || cell.dataset.editing || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const tr = cell.closest('tr');
  const deal = findDeal(Number(tr.dataset.row), tr.dataset.address);
  if(!deal) return;

  const colKey = cell.dataset.colkey;
  const type = EDIT_TYPES[colKey];
  const current = cellValue(deal, colKey);

  cell.dataset.editing = '1';
  const prevHTML = cell.innerHTML;
  cell.innerHTML = '';
  let input;
  const list = type === 'text' ? sheetList(colKey) : null;
  if(list){
    input = document.createElement('select');
    const opts = [''].concat(list);
    if(current && opts.indexOf(current) === -1) opts.push(current);
    opts.forEach(function(v){
      const o = document.createElement('option');
      o.value = o.textContent = v;
      if(v === current) o.selected = true;
      input.appendChild(o);
    });
  } else if(type === 'textarea'){
    input = document.createElement('textarea');
    input.rows = 4;
    input.value = current;
  } else {
    input = document.createElement('input');
    input.type = type;
    if(type === 'number'){ input.min = '0'; input.step = '500'; }
    input.value = current;
  }
  cell.appendChild(input);
  input.focus();
  if(type === 'text' && !list) input.select();

  let finished = false;
  function cancel(){
    if(finished) return; finished = true;
    cell.innerHTML = prevHTML; delete cell.dataset.editing;
  }
  async function commit(){
    if(finished) return; finished = true;
    const raw = input.value.trim();
    const changed = String(raw) !== String(current);
    if(!changed){ cell.innerHTML = prevHTML; delete cell.dataset.editing; return; }
    input.disabled = true;
    try{
      const j = await postAction({
        token: SCRIPT_TOKEN, action: 'updateCell',
        row: deal.row, address: deal.address,
        colKey: colKey, value: raw
      }, 'Saving…', 'Saved ✓');
      deal.row = j.row;
      if(colKey === 'ADDRESS') deal.address = raw;
      if(colKey === 'SELLER') deal.seller = raw;
      if(colKey === 'SR') deal.sr = raw;
      if(colKey === 'JR') deal.jr = raw;
      if(colKey === 'TITLE') deal.title = raw;
      if(colKey === 'NOTES1') deal.notes1 = raw;
      if(colKey === 'CONTRACT') deal.contract = isoToMDY(raw);
      if(colKey === 'COE') deal.coe = isoToMDY(raw);
      if(colKey === 'PRICE') deal.price = raw === '' ? '' : Number(raw);
      if(colKey === 'ASSIGNED') deal.assigned = raw === '' ? '' : Number(raw);
      render();
    }catch(err){
      document.getElementById('status-msg').textContent = 'Save failed: ' + err.message;
      cell.innerHTML = prevHTML; delete cell.dataset.editing;
    }
  }
  input.addEventListener('keydown', function(ev){
    if(ev.key === 'Enter'){
      if(type === 'textarea'){
        if(ev.metaKey || ev.ctrlKey) commit(); // plain Enter = newline in notes
      } else {
        commit();
      }
    }
    if(ev.key === 'Escape') cancel();
  });
  input.addEventListener('blur', commit);
  if(list) input.addEventListener('change', commit);
});

const STATUS_OPTIONS = ['MARKET','EMD','ASSIGNED','NEED PICS','Price Drop','1HO','CTC','CLOSED','CANCEL'];

/* populate the Add Deal modal selects from the sheet's validation lists */
function fillSelect(id, list, keepBlank){
  if(!list) return;
  const sel = document.getElementById(id);
  const prev = sel.value;
  sel.innerHTML = (keepBlank ? '<option value=""></option>' : '') +
    list.map(function(v){ return '<option>'+esc(v)+'</option>'; }).join('');
  if(list.indexOf(prev) > -1 || (keepBlank && prev === '')) sel.value = prev;
}
function populateModalFromSheet(){
  if(!DATA || !DATA.dropdowns) return;
  fillSelect('d-status', DATA.dropdowns.STATUS, false);
  fillSelect('d-source', DATA.dropdowns.LEAD_SOURCE, false);
  fillSelect('d-type',   DATA.dropdowns.DEAL_TYPE, false);

  fillSelect('d-jr',     DATA.dropdowns.JR, true);

      DATA.dropdowns.TITLE.map(function(v){ return '<option>'+esc(v)+'</option>'; }).join('');

document.getElementById('sections').addEventListener('click', function(e){
  const chip = e.target.closest('button.chip');
  if(!chip || chip.dataset.editing) return;
  chip.dataset.editing = '1';

  const cur = chip.dataset.status;
  const sel = document.createElement('select');
  sel.className = 'chip-editing';
  const base = statusList();
  const opts = base.includes(cur) || !cur ? base : [cur].concat(base);
  opts.forEach(function(s){
    const o = document.createElement('option');
    o.value = o.textContent = s;
    if(s === cur) o.selected = true;
    sel.appendChild(o);
  });

  chip.replaceWith(sel);
  sel.focus();

  let done = false;
  function restore(){ if(!done){ done = true; sel.replaceWith(chip); delete chip.dataset.editing; } }

  sel.addEventListener('blur', restore);
  sel.addEventListener('keydown', function(ev){ if(ev.key === 'Escape') restore(); });
  sel.addEventListener('change', async function(){
    const newStatus = sel.value;
    if(newStatus === cur){ restore(); return; }
    done = true;
    sel.disabled = true;
    const msg = document.getElementById('status-msg');
    msg.textContent = 'Updating status…';
    try{
      const res = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({
        token: SCRIPT_TOKEN, action: 'updateStatus',
        row: Number(chip.dataset.row), address: chip.dataset.address, status: newStatus
      })});
      const j = await res.json();
      if(j.error) throw new Error(j.error);
      // update local data + re-render
      DATA.sections.forEach(function(sec){
        sec.deals.forEach(function(d){
          if(d.row === Number(chip.dataset.row) && d.address === chip.dataset.address){
            d.status = newStatus;
            d.row = j.row; // in case the row had shifted and the script re-found it
            d.cancelled = newStatus.toUpperCase().indexOf('CANCEL') > -1;
          }
        });
      });
      msg.textContent = 'Status updated ✓';
      setTimeout(function(){ msg.textContent = ''; }, 2500);
      render();
    }catch(err){
      msg.textContent = 'Update failed: ' + err.message;
      sel.replaceWith(chip);
      delete chip.dataset.editing;
    }
  });
});

/* ================= DRAG TO MOVE ROWS ================= */
let dragInfo = null;
const sectionsHost = document.getElementById('sections');

sectionsHost.addEventListener('dragstart', function(e){
  const grip = e.target.closest('td.grip');
  if(!grip){ e.preventDefault(); return; }
  const tr = grip.closest('tr');
  dragInfo = { row: Number(tr.dataset.row), address: tr.dataset.address };
  tr.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', tr.dataset.address); // required for Firefox
});

sectionsHost.addEventListener('dragend', function(){
  dragInfo = null;
  clearDropMarks();
});

function clearDropMarks(){
  sectionsHost.querySelectorAll('.drop-before,.drop-after,.dragging').forEach(function(el){
    el.classList.remove('drop-before','drop-after','dragging');
  });
}

sectionsHost.addEventListener('dragover', function(e){
  if(!dragInfo) return;
  const tr = e.target.closest('tr[data-row]');
  if(!tr) return;
  e.preventDefault(); // allow drop
  e.dataTransfer.dropEffect = 'move';
  const rect = tr.getBoundingClientRect();
  const before = (e.clientY - rect.top) < rect.height / 2;
  sectionsHost.querySelectorAll('.drop-before,.drop-after').forEach(function(el){
    if(el !== tr) el.classList.remove('drop-before','drop-after');
  });
  tr.classList.toggle('drop-before', before);
  tr.classList.toggle('drop-after', !before);
});

sectionsHost.addEventListener('drop', async function(e){
  if(!dragInfo) return;
  const tr = e.target.closest('tr[data-row]');
  if(!tr) return;
  e.preventDefault();

  const rect = tr.getBoundingClientRect();
  const position = (e.clientY - rect.top) < rect.height / 2 ? 'before' : 'after';
  const payload = {
    token: SCRIPT_TOKEN, action: 'moveRow',
    row: dragInfo.row, address: dragInfo.address,
    targetRow: Number(tr.dataset.row), targetAddress: tr.dataset.address,
    position: position
  };
  dragInfo = null;
  clearDropMarks();

  if(payload.row === payload.targetRow) return;

  const msg = document.getElementById('status-msg');
  msg.textContent = 'Moving row…';
  try{
    const res = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify(payload) });
    const j = await res.json();
    if(j.error) throw new Error(j.error);
    msg.textContent = 'Row moved ✓';
    setTimeout(function(){ msg.textContent = ''; }, 2500);
    loadDeals(); // row numbers shift after a move — always re-pull
  }catch(err){
    msg.textContent = 'Move failed: ' + err.message;
  }
});

function fmtUS(iso){ // yyyy-mm-dd → m/d/yy for the sheet
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return parseInt(m)+'/'+parseInt(d)+'/'+y.slice(2);
}

async function saveDeal(){
  const address = document.getElementById('d-address').value.trim();
  const msg = document.getElementById('form-msg');
  if(!address){ msg.textContent='Property address is required.'; msg.className='err'; return; }

  const btn = document.getElementById('save-btn');
  btn.disabled = true; msg.textContent='Saving…'; msg.className='ok';

  const payload = {
    token: SCRIPT_TOKEN,
    status: document.getElementById('d-status').value,
    leadSource: document.getElementById('d-source').value,
    dealType: document.getElementById('d-type').value,
    sr: document.getElementById('d-sr').value,
    jr: document.getElementById('d-jr').value,
    seller: document.getElementById('d-seller').value.trim(),
    address: address,
    title: document.getElementById('d-title').value.trim(),
    notes: document.getElementById('d-notes').value.trim(),
    leadDate: fmtUS(document.getElementById('d-leaddate').value),
    contract: fmtUS(document.getElementById('d-contract').value),
    coe: fmtUS(document.getElementById('d-coe').value),
    price: document.getElementById('d-price').value
  };

  try{
    const res = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify(payload) });
    const j = await res.json();
    if(j.error) throw new Error(j.error);
    msg.textContent = 'Deal added — row ' + j.row + '. Refreshing…';
    ['d-address','d-seller','d-notes','d-price','d-leaddate','d-coe','d-title'].forEach(id=>document.getElementById(id).value='');
    setTimeout(()=>{ closeModal(); loadDeals(); }, 900);
  }catch(err){
    msg.textContent = 'Save failed: ' + err.message;
    msg.className='err';
  }finally{
    btn.disabled = false;
  }
}
