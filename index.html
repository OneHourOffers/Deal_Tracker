<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Deal Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* ============ 1HO PALETTE ============ */
:root{
  --navy:#0E3E54; --teal:#1d6b8a; --coral:#F08080; --sky:#30A0D0;
  --peach:#F0C980; --cream:#f5f3ef;
  --green:#22C55E; --red:#EF4444; --cyan:#40E0D0; --magenta:#E93FD3;
  --ink:#111; --line:#d9d4cb;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Archivo',sans-serif;font-weight:400;background:var(--cream);color:var(--ink);min-height:100vh}

/* ============ HEADER ============ */
header{background:var(--navy);color:#fff;padding:18px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header .logo{height:40px;width:auto;display:block;flex:none}
header h1{font-weight:800;font-size:20px;letter-spacing:-.02em}
header .sub{font-size:12px;opacity:.75}
header .spacer{flex:1}
.btn{border:none;border-radius:8px;padding:10px 18px;font:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:transform .06s}
.btn:active{transform:scale(.97)}
.btn-refresh{background:#fff;color:var(--navy)}
.btn:focus-visible{outline:3px solid var(--peach)}

/* ============ FILTER BAR ============ */
.filters{display:flex;gap:10px;padding:14px 22px;flex-wrap:wrap;align-items:center;background:#fff;border-bottom:2px solid var(--line)}
.filters input,.filters select{padding:9px 12px;border:2px solid var(--line);border-radius:8px;font:inherit;font-size:14px;background:#fff}
.filters input{min-width:220px;flex:1;max-width:340px}
.filters input:focus,.filters select:focus{outline:none;border-color:var(--sky)}
.cols-wrap{position:relative}
#cols-btn{padding:9px 14px;border:2px solid var(--line);border-radius:8px;font:inherit;font-size:14px;font-weight:700;background:#fff;cursor:pointer;color:var(--navy)}
#cols-btn:hover{border-color:var(--sky)}
#cols-panel{position:absolute;top:calc(100% + 6px);left:0;z-index:800;display:none;background:#fff;border:2px solid var(--navy);border-radius:10px;padding:10px 14px;min-width:190px;box-shadow:0 8px 24px rgba(14,62,84,.2);max-height:60vh;overflow-y:auto}
#cols-panel.open{display:block}
#cols-panel label{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;padding:5px 0;cursor:pointer;white-space:nowrap}
#cols-panel input{accent-color:var(--navy)}
#status-msg{font-size:12px;font-weight:700;color:var(--teal);margin-left:auto}

/* ============ SECTIONS ============ */
main{padding:0 0 60px}
.section-banner{background:#000;color:#fff;font-weight:800;font-size:16px;letter-spacing:.03em;padding:12px 22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;cursor:pointer;user-select:none}
.section-banner .caret{font-size:13px;width:14px;display:inline-block}
.section-banner:hover{background:#1a1a1a}
.section-banner .totals{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.pill{border-radius:6px;padding:4px 12px;font-size:13px;font-weight:800}
.pill-count{background:#fff;color:#000}
.pill-green{background:var(--green);color:#052a15}
.pill-peach{background:var(--peach);color:#4a3000}

.table-wrap{overflow-x:auto;background:#fff}
table{border-collapse:collapse;width:100%;min-width:1080px;font-size:13px;table-layout:fixed}
thead th{background:var(--navy);color:#fff;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;text-align:left;position:sticky;top:0;white-space:normal;overflow-wrap:break-word;line-height:1.25;vertical-align:middle}
thead th.num{text-align:right}
thead th .rz{position:absolute;top:0;right:0;width:9px;height:100%;cursor:col-resize;user-select:none}
thead th .rz:hover,thead th .rz.active{background:var(--sky)}
tbody td{padding:9px 10px;border-bottom:1px solid #eee;vertical-align:top;overflow-wrap:break-word}
tbody tr:hover{background:#f2f8fb}
tr.cancelled td{color:#b3261e;text-decoration:line-through;background:#fdeceb}
tr.cancelled:hover td{background:#fbdcda}
td.addr{font-weight:700;min-width:190px}
td.seller{min-width:130px}
td.notes{min-width:240px;max-width:360px;font-size:12px;color:#444;white-space:pre-line}
td.num{text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
td.date{white-space:nowrap}
td.gross-pos{color:#0e7a3d;font-weight:700}

.chip{display:inline-block;border:none;border-radius:6px;padding:3px 10px;font-weight:800;font-size:11px;letter-spacing:.03em;white-space:nowrap;font-family:inherit;cursor:pointer;background:#000;color:#fff}
.chip:hover{outline:2px solid var(--sky);outline-offset:1px}
.chip:focus-visible{outline:3px solid var(--peach)}
.chip-editing{padding:2px 6px;border:2px solid var(--sky);border-radius:6px;font:inherit;font-size:12px;font-weight:700;background:#fff}


/* cell notes — Sheets-style corner triangle; right-click / long-press any cell */
td[data-colkey]{position:relative}
td.has-note::after{content:'';position:absolute;top:0;right:0;border-style:solid;border-width:0 9px 9px 0;border-color:transparent var(--peach) transparent transparent}
#note-pop{position:fixed;z-index:950;display:none;background:var(--cream);border:2px solid var(--navy);border-radius:10px;padding:12px;width:280px;box-shadow:0 8px 24px rgba(14,62,84,.25)}
#note-pop.open{display:block}
#note-pop .np-head{font-weight:800;font-size:12px;color:var(--navy);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
#note-pop .np-body{font-size:12px;background:#fff;border:1px solid var(--line);border-radius:6px;padding:8px 10px;white-space:pre-line;max-height:40vh;overflow-y:auto}
#note-pop .np-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:8px}
#note-pop button{border:none;border-radius:6px;font:inherit;font-weight:700;font-size:12px;padding:6px 12px;cursor:pointer}
#note-pop .np-close{background:#e2ded6;color:#333}

/* long-press action menu (touch devices) */
#cell-menu{position:fixed;z-index:960;display:none;background:var(--navy);border-radius:10px;padding:6px;box-shadow:0 8px 24px rgba(0,0,0,.35);gap:6px}
#cell-menu.open{display:flex}
#cell-menu button{border:none;border-radius:7px;background:#fff;color:var(--navy);font:inherit;font-weight:800;font-size:13px;padding:9px 16px;cursor:pointer}
#cell-menu button:active{background:var(--sky);color:#fff}
@media (pointer:coarse){
  td[data-colkey]{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
}

/* inline cell editing */
td.editable{cursor:text}
td.editable:hover{background:#eaf5fb;box-shadow:inset 0 0 0 1px var(--sky)}
td.editable input{width:100%;min-width:90px;font-family:inherit;font-size:13px;padding:4px 6px;border:2px solid var(--sky);border-radius:5px;background:#fff}
td.editable input:focus{outline:none}
td.editable textarea{width:100%;min-width:220px;min-height:76px;font-family:inherit;font-size:12px;padding:5px 7px;border:2px solid var(--sky);border-radius:5px;background:#fff;resize:vertical;color:#000}
td.editable textarea:focus{outline:none}
td.editable select{width:100%;min-width:90px;font-family:inherit;font-size:13px;padding:4px 6px;border:2px solid var(--sky);border-radius:5px;background:#fff;color:#000}
td.editable select:focus{outline:none}

.empty{padding:40px 22px;text-align:center;color:#888;font-weight:700}
#loading{padding:60px 22px;text-align:center;font-weight:800;color:var(--navy);font-size:16px}


@media (max-width:640px){
  .grid{grid-template-columns:1fr}
  header h1{font-size:17px}
  .filters input{min-width:140px}
}
@media (prefers-reduced-motion: reduce){ *{transition:none!important} }
</style>
</head>

<script>
/* ================================================================
   CONFIG — the only things you edit
   ================================================================ */
const SCRIPT_URL   = 'https://script.google.com/macros/s/AKfycbw5IMD8ULM4pnBrUnhjLadeYIwP0yRNk8iWuap0BiFsDDSmx-9FsiqdbLDzQGob6nTW/exec';
const SCRIPT_TOKEN = 'oho-2026-x7';   // must match CFG.TOKEN in Code.gs
const SHOW_MONEY   = true;            // false = hide Gross / Payouts / DISPO / OHO
const AUTO_REFRESH_MIN = 2;

/* ================= DATA ================= */
let DATA = null;

async function loadDeals(){
  const msg = document.getElementById('status-msg');
  msg.textContent = 'Refreshing…';
  try{
    const res = await fetch(SCRIPT_URL + '?token=' + encodeURIComponent(SCRIPT_TOKEN));
    const j = await res.json();
    if(j.error) throw new Error(j.error);
    DATA = j;
    document.getElementById('last-updated').textContent = 'Updated ' + j.updated;
    document.getElementById('loading').style.display='none';
    msg.textContent = '';
    populateFilters();
    render();
  }catch(err){
    document.getElementById('loading').textContent = 'COULD NOT LOAD — check SCRIPT_URL / deployment';
    msg.textContent = 'Load failed';
    console.error(err);
  }
}

/* ================= RENDER ================= */
function money(v){
  if(v === '' || v === null || v === undefined) return '';
  if(typeof v !== 'number') return v;
  return '$' + v.toLocaleString();
}
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function chipClass(status){
  const s = status.toUpperCase().replace(/\s+/g,'');
  if(s.includes('EMD')) return 'chip-EMD';
  if(s.includes('ASSIGN')) return 'chip-ASSIGNED';
  if(s === '1HO') return 'chip-1HO';
  if(s.includes('MARKET')) return 'chip-MARKET';
  if(s.includes('PIC')) return 'chip-NEEDPICS';
  if(s.includes('PRICE')) return 'chip-PRICEDROP';
  if(s.includes('CANCEL')) return 'chip-CANCEL';
  if(s.includes('SOLD')||s.includes('CLOSED')||s.includes('CTC')) return 'chip-SOLD';
  return 'chip-default';
}

function dealMatches(d){
  const q = document.getElementById('f-search').value.trim().toLowerCase();
  const rep = document.getElementById('f-rep').value;
  const st  = document.getElementById('f-status').value;
  if(rep){
    const reps = [d.sr, d.jr].join(' ').toLowerCase();
    const target = rep.toLowerCase() === 'nathan' ? 'nat' : rep.toLowerCase();
    if(!reps.includes(target)) return false;
  }
  if(st && !d.status.toUpperCase().includes(st.toUpperCase())) return false;
  if(q){
    const hay = [d.address,d.seller,d.notes1,d.notes2,d.status,d.title,d.leadSource].join(' ').toLowerCase();
    if(!hay.includes(q)) return false;
  }
  return true;
}

/* ================= COLUMN SYSTEM ================= */
function chipHtml(d){
  return '<button class="chip '+chipClass(d.status)+'" data-row="'+d.row+'" data-address="'+esc(d.address)+'" data-status="'+esc(d.status)+'" title="Click to change status">'+esc(d.status||'—')+'</button>';
}
const COLUMN_DEFS = [
  {key:'STATUS',      label:'Status',            cls:'',       editable:false, render:function(d){return chipHtml(d);}},
  {key:'LEAD_SOURCE', label:'Lead Source',       cls:'',       editable:true,  render:function(d){return esc(d.leadSource);}},
  {key:'DEAL_TYPE',   label:'Deal Type',         cls:'',       editable:true,  render:function(d){return esc(d.dealType);}},
  {key:'SR',          label:'Sr. ACQ',           cls:'',       editable:true,  render:function(d){return esc(d.sr);}},
  {key:'JR',          label:'Jr. Acq',           cls:'',       editable:true,  render:function(d){return esc(d.jr);}},
  {key:'SELLER',      label:'Seller On Deed',    cls:'seller', editable:true,  render:function(d){return esc(d.seller);}},
  {key:'ADDRESS',     label:'Property Address',  cls:'addr',   editable:true,  render:function(d){return esc(d.address);}},
  {key:'ASSIGNEE',    label:'Assignee LLC',      cls:'',       editable:true,  render:function(d){return esc(d.assignee);}},
  {key:'TITLE',       label:'Title',             cls:'',       editable:true,  render:function(d){return esc(d.title);}},
  {key:'NOTES1',      label:'Last Major Update', cls:'notes',  editable:true,  render:function(d){return esc([d.notes1,d.notes2].filter(Boolean).join('\n'));}},
  {key:'LEAD_DATE',   label:'Lead Date',         cls:'date',   editable:true,  render:function(d){return esc(d.leadDate);}},
  {key:'CONTRACT',    label:'Contract Signed',   cls:'date',   editable:true,  render:function(d){return esc(d.contract);}},
  {key:'DAYS_UC',     label:'Days UC',           cls:'num',    editable:false, render:function(d){return esc(d.daysUC);}},
  {key:'COE',         label:'COE',               cls:'date',   editable:true,  render:function(d){return esc(d.coe);}},
  {key:'SOLD',        label:'Sold',              cls:'date',   editable:true,  render:function(d){return esc(d.sold);}},
  {key:'TITLE_REPORT',label:'Title Report',      cls:'',       editable:true,  render:function(d){return esc(d.titleReport);}},
  {key:'CLEAR_TITLE', label:'Clear Title',       cls:'',       editable:true,  render:function(d){return esc(d.clearTitle);}},
  {key:'HUD',         label:'HUD',               cls:'',       editable:true,  render:function(d){return esc(d.hud);}},
  {key:'PRICE',       label:'UC Price',          cls:'num',    editable:true,  render:function(d){return money(d.price);}},
  {key:'ASSIGNED',    label:'Assigned Price',    cls:'num',    editable:true,  render:function(d){return money(d.assigned);}},
  {key:'GROSS',       label:'Gross Profit',      cls:'num gross-pos', money:true, editable:false, render:function(d){return money(d.gross);}},
  {key:'SR_PAYOUT',   label:'Sr. Payout',        cls:'num', money:true, editable:false, render:function(d){return money(d.srPayout);}},
  {key:'JR_PAYOUT',   label:'Jr. Payout',        cls:'num', money:true, editable:false, render:function(d){return money(d.jrPayout);}},
  {key:'DISPO',       label:'DISPO',             cls:'num', money:true, editable:false, render:function(d){return money(d.dispo);}},
  {key:'OHO',         label:'OHO',               cls:'num', money:true, editable:false, render:function(d){return money(d.oho);}}
];
const ACTIVE_COLUMNS = COLUMN_DEFS.filter(function(c){ return SHOW_MONEY || !c.money; });

/* cell colors come from the sheet (conditional formatting rules + manual fills);
   text color auto-picks black/white by background luminance */
function textOn(bg){
  const c = bg.replace('#','');
  const r = parseInt(c.substr(0,2),16), g = parseInt(c.substr(2,2),16), b = parseInt(c.substr(4,2),16);
  return (0.299*r + 0.587*g + 0.114*b) > 128 ? '#111111' : '#ffffff';
}

let hiddenCols = {};
try{ hiddenCols = JSON.parse(localStorage.getItem('oho_dt_hidden_cols') || '{}'); }catch(e){ hiddenCols = {}; }
function saveHiddenCols(){ localStorage.setItem('oho_dt_hidden_cols', JSON.stringify(hiddenCols)); }
function visibleColumns(){ return ACTIVE_COLUMNS.filter(function(c){ return !hiddenCols[c.key]; }); }
function colLabel(c){
  return (DATA && DATA.headers && DATA.headers[c.key]) ? DATA.headers[c.key] : c.label;
}

/* column widths: sensible defaults, drag-resizable, persisted per device */
const DEFAULT_W = { STATUS:92, LEAD_SOURCE:100, DEAL_TYPE:80, SR:80, JR:80, SELLER:150, ADDRESS:200, ASSIGNEE:130, TITLE:130, NOTES1:280, LEAD_DATE:90, CONTRACT:95, DAYS_UC:64, COE:90, SOLD:90, TITLE_REPORT:80, CLEAR_TITLE:80, HUD:60, PRICE:100, ASSIGNED:110, GROSS:110, SR_PAYOUT:95, JR_PAYOUT:95, DISPO:85, OHO:95 };
let colWidths = {};
try{ colWidths = JSON.parse(localStorage.getItem('oho_dt_col_widths') || '{}'); }catch(e){ colWidths = {}; }
function colW(key){ return colWidths[key] || DEFAULT_W[key] || 120; }
function saveColWidths(){ localStorage.setItem('oho_dt_col_widths', JSON.stringify(colWidths)); }

/* columns menu */
function buildColsPanel(){
  const panel = document.getElementById('cols-panel');
  panel.innerHTML = ACTIVE_COLUMNS.map(function(c){
    return '<label><input type="checkbox" data-colkey="'+c.key+'"'+(hiddenCols[c.key]?'':' checked')+'> '+esc(colLabel(c))+'</label>';
  }).join('');
}
document.getElementById('cols-btn').addEventListener('click', function(e){
  e.stopPropagation();
  buildColsPanel();
  document.getElementById('cols-panel').classList.toggle('open');
});
document.getElementById('cols-panel').addEventListener('change', function(e){
  const key = e.target.dataset.colkey;
  if(!key) return;
  if(e.target.checked) delete hiddenCols[key]; else hiddenCols[key] = true;
  saveHiddenCols();
  render();
});
document.addEventListener('click', function(e){
  const panel = document.getElementById('cols-panel');
  if(panel.classList.contains('open') && !e.target.closest('.cols-wrap')) panel.classList.remove('open');
});

/* sections collapse: year sections before the current year start collapsed */
const sectionToggles = {}; // user overrides, name -> true(collapsed)/false(open)
function isCollapsed(name){
  if(name in sectionToggles) return sectionToggles[name];
  return /\b(19|20)\d{2}\b/.test(name); // sections named with a year start collapsed
}
function noteAttrs(d, colKey){
  const n = d.cellNotes && d.cellNotes[colKey];
  return (n ? ' has-note' : '') + '" data-colkey="' + colKey + '"' + (n ? ' title="'+esc(n)+'"' : '');
}
function td(d, colKey, cls, inner, editable, style){
  return '<td class="'+cls+noteAttrs(d, colKey)+(style?' style="'+style+'"':'')+'>'+inner+'</td>';
}

function render(){
  if(!DATA) return;
  const host = document.getElementById('sections');
  host.innerHTML = '';

  const secFilter = document.getElementById('f-section').value;

  DATA.sections.forEach(sec=>{
    if(secFilter && sec.name !== secFilter) return;
    const deals = sec.deals.filter(dealMatches);
    if(!deals.length) return;

    const grossSum = deals.reduce(function(a,d){
      return a + ((!d.cancelled && typeof d.gross==='number' && isFinite(d.gross)) ? d.gross : 0);
    }, 0);

    let totals = '<span class="pill pill-count">'+deals.length+' deals</span>';
    if(SHOW_MONEY && grossSum) totals += '<span class="pill pill-green">'+money(grossSum)+' gross profit</span>';

    const collapsed = secFilter ? false : isCollapsed(sec.name);
    const banner = '<div class="section-banner" data-section="'+esc(sec.name)+'">'+
      '<span class="caret">'+(collapsed?'▸':'▾')+'</span>'+esc(sec.name.toUpperCase())+
      '<span class="totals">'+totals+'</span></div>';

    if(collapsed){ host.insertAdjacentHTML('beforeend', banner); return; }

    const cols = visibleColumns();
    const rows = deals.map(d=>{
      const cc = d.cellColors || {};
      return '<tr class="'+(d.cancelled?'cancelled':'')+'" data-row="'+d.row+'" data-address="'+esc(d.address)+'">'+
        cols.map(function(c){
          const bg = cc[c.key];
          const fg = bg ? ((d.cellFonts && d.cellFonts[c.key]) || textOn(bg)) : '';
          const style = bg ? 'background:'+bg+';color:'+fg : '';
          return td(d, c.key, c.cls, c.render(d), c.editable, style);
        }).join('')+
      '</tr>';
    }).join('');

    host.insertAdjacentHTML('beforeend',
      banner+
      '<div class="table-wrap"><table>'+
      '<colgroup>'+
        cols.map(function(c){ return '<col data-colkey="'+c.key+'" style="width:'+colW(c.key)+'px">'; }).join('')+
      '</colgroup>'+
      '<thead><tr>'+
        cols.map(function(c){
          const numCls = c.cls.indexOf('num') > -1 ? ' class="num"' : '';
          return '<th'+numCls+' data-colkey="'+c.key+'">'+esc(colLabel(c))+'<span class="rz"></span></th>';
        }).join('')+
      '</tr></thead><tbody>'+rows+'</tbody></table></div>'
    );
  });

  if(!host.innerHTML) host.innerHTML = '<div class="empty">No deals match your filters.</div>';
}

/* ================= SHARED HELPERS ================= */
function findDeal(row, address){
  let hit = null;
  DATA.sections.forEach(function(sec){
    sec.deals.forEach(function(d){
      if(d.row === row && d.address === address) hit = d;
    });
  });
  return hit;
}
async function postAction(payload, busyText, okText){
  const msg = document.getElementById('status-msg');
  msg.textContent = busyText;
  const res = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify(payload) });
  const j = await res.json();
  if(j.error) throw new Error(j.error);
  msg.textContent = okText;
  setTimeout(function(){ if(msg.textContent === okText) msg.textContent = ''; }, 2500);
  return j;
}
function mdyToISO(mdy){ // m/d/yy → yyyy-mm-dd for date inputs
  const p = String(mdy||'').split('/');
  if(p.length !== 3) return '';
  let y = p[2].length === 2 ? '20'+p[2] : p[2];
  return y+'-'+String(p[0]).padStart(2,'0')+'-'+String(p[1]).padStart(2,'0');
}
function isoToMDY(iso){
  if(!iso) return '';
  const p = iso.split('-');
  return parseInt(p[1])+'/'+parseInt(p[2])+'/'+p[0].slice(2);
}

/* ================= COLUMN RESIZE ================= */
document.getElementById('sections').addEventListener('mousedown', function(e){
  const rz = e.target.closest('.rz');
  if(!rz) return;
  e.preventDefault();
  const th = rz.closest('th');
  const key = th.dataset.colkey;
  const startX = e.pageX;
  const startW = colW(key);
  rz.classList.add('active');

  function onMove(ev){
    const w = Math.max(46, startW + (ev.pageX - startX));
    colWidths[key] = w;
    document.querySelectorAll('col[data-colkey="'+key+'"]').forEach(function(col){
      col.style.width = w + 'px';
    });
  }
  function onUp(){
    rz.classList.remove('active');
    saveColWidths();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

/* ================= BANNER COLLAPSE ================= */
document.getElementById('sections').addEventListener('click', function(e){
  const banner = e.target.closest('.section-banner');
  if(banner){
    const name = banner.dataset.section;
    sectionToggles[name] = !isCollapsed(name);
    render();
  }
});

/* ================= CELL NOTES (view only — editing happens on the sheet) ================= */
document.body.insertAdjacentHTML('beforeend',
  '<div id="note-pop"><div class="np-head">Note</div>'+
  '<div class="np-body"></div>'+
  '<div class="np-actions"><button class="np-close">Close</button></div></div>');
const notePop = document.getElementById('note-pop');
function openNotePop(cell, x, y){
  const tr = cell.closest('tr');
  const deal = findDeal(Number(tr.dataset.row), tr.dataset.address);
  if(!deal) return;
  const note = (deal.cellNotes && deal.cellNotes[cell.dataset.colkey]) || '';
  if(!note) return;
  notePop.querySelector('.np-body').textContent = note;
  notePop.classList.add('open');
  notePop.style.left = Math.min(x, window.innerWidth - 290) + 'px';
  notePop.style.top  = Math.min(y, window.innerHeight - 180) + 'px';
}
function closeNotePop(){ notePop.classList.remove('open'); }
notePop.querySelector('.np-close').addEventListener('click', closeNotePop);

document.getElementById('sections').addEventListener('contextmenu', function(e){
  const cell = e.target.closest('td.has-note');
  if(!cell) return;
  e.preventDefault();
  openNotePop(cell, e.clientX, e.clientY);
});

// mobile: long-press a noted cell to view its note; other cells offer Copy
document.body.insertAdjacentHTML('beforeend',
  '<div id="cell-menu"><button class="cm-copy">Copy</button></div>');
const cellMenu = document.getElementById('cell-menu');
let menuCtx = null;
function openCellMenu(cell, x, y){
  menuCtx = { cell: cell };
  cellMenu.classList.add('open');
  cellMenu.style.left = Math.min(x, window.innerWidth - 120) + 'px';
  cellMenu.style.top  = Math.min(y, window.innerHeight - 60) + 'px';
}
function closeCellMenu(){ cellMenu.classList.remove('open'); menuCtx = null; }
cellMenu.querySelector('.cm-copy').addEventListener('click', async function(){
  if(!menuCtx) return;
  try{
    await navigator.clipboard.writeText(menuCtx.cell.innerText.trim());
    document.getElementById('status-msg').textContent = 'Copied ✓';
  }catch(err){
    document.getElementById('status-msg').textContent = 'Copy failed';
  }
  setTimeout(function(){ document.getElementById('status-msg').textContent = ''; }, 2000);
  closeCellMenu();
});
let lpTimer = null;
document.getElementById('sections').addEventListener('touchstart', function(e){
  const cell = e.target.closest('td[data-colkey]');
  if(!cell) return;
  const t = e.touches[0];
  lpTimer = setTimeout(function(){
    if(cell.classList.contains('has-note')) openNotePop(cell, t.clientX, t.clientY);
    else openCellMenu(cell, t.clientX, t.clientY);
  }, 500);
}, {passive:true});
['touchend','touchmove','touchcancel'].forEach(function(ev){
  document.getElementById('sections').addEventListener(ev, function(){ clearTimeout(lpTimer); }, {passive:true});
});
document.addEventListener('click', function(e){
  if(notePop.classList.contains('open') && !notePop.contains(e.target)) closeNotePop();
  if(cellMenu.classList.contains('open') && !cellMenu.contains(e.target)) closeCellMenu();
});
document.addEventListener('touchstart', function(e){
  if(cellMenu.classList.contains('open') && !cellMenu.contains(e.target)) closeCellMenu();
}, {passive:true});

/* ================= INLINE STATUS EDIT ================= */
const STATUS_OPTIONS = ['MARKET','EMD','ASSIGNED','NEED PICS','Price Drop','1HO','CTC','CLOSED','CANCEL'];
function statusList(){
  return (DATA && DATA.dropdowns && DATA.dropdowns.STATUS && DATA.dropdowns.STATUS.length)
    ? DATA.dropdowns.STATUS : STATUS_OPTIONS;
}
function sheetList(colKey){
  return (DATA && DATA.dropdowns && DATA.dropdowns[colKey] && DATA.dropdowns[colKey].length)
    ? DATA.dropdowns[colKey] : null;
}

/* filters: statuses from the sheet's validation list, sections from the sheet's
   dividers, reps from the Sr/Jr validation lists — all refreshed on each load */
function refillFilter(id, blankLabel, list){
  const sel = document.getElementById(id);
  const keep = sel.value;
  sel.innerHTML = '<option value="">'+blankLabel+'</option>' +
    list.map(function(v){ return '<option>'+esc(v)+'</option>'; }).join('');
  for(let i = 0; i < sel.options.length; i++){
    if(sel.options[i].value === keep){ sel.value = keep; break; }
  }
}
function populateFilters(){
  if(!DATA) return;
  refillFilter('f-status', 'All Statuses', statusList());
  refillFilter('f-section', 'All Sections', DATA.sections.map(function(s){ return s.name; }));
  const reps = [].concat(sheetList('SR') || [], sheetList('JR') || []).filter(Boolean);
  if(reps.length){
    const uniq = reps.filter(function(v, i){ return reps.indexOf(v) === i; });
    refillFilter('f-rep', 'All Reps', uniq);
  }
}

document.getElementById('sections').addEventListener('click', function(e){
  const chip = e.target.closest('button.chip');
  if(!chip || chip.dataset.editing) return;
  chip.dataset.editing = '1';

  const cur = chip.dataset.status;
  const sel = document.createElement('select');
  sel.className = 'chip-editing';
  const base = statusList();
  const opts = base.includes(cur) || !cur ? base : [cur].concat(base);
  opts.forEach(function(s){
    const o = document.createElement('option');
    o.value = o.textContent = s;
    if(s === cur) o.selected = true;
    sel.appendChild(o);
  });

  chip.replaceWith(sel);
  sel.focus();

  let done = false;
  function restore(){ if(!done){ done = true; sel.replaceWith(chip); delete chip.dataset.editing; } }

  sel.addEventListener('blur', restore);
  sel.addEventListener('keydown', function(ev){ if(ev.key === 'Escape') restore(); });
  sel.addEventListener('change', async function(){
    const newStatus = sel.value;
    if(newStatus === cur){ restore(); return; }
    done = true;
    sel.disabled = true;
    const msg = document.getElementById('status-msg');
    msg.textContent = 'Updating status…';
    try{
      const res = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify({
        token: SCRIPT_TOKEN, action: 'updateStatus',
        row: Number(chip.dataset.row), address: chip.dataset.address, status: newStatus
      })});
      const j = await res.json();
      if(j.error) throw new Error(j.error);
      // update local data + re-render
      DATA.sections.forEach(function(sec){
        sec.deals.forEach(function(d){
          if(d.row === Number(chip.dataset.row) && d.address === chip.dataset.address){
            d.status = newStatus;
            d.row = j.row; // in case the row had shifted and the script re-found it
            d.cancelled = newStatus.toUpperCase().indexOf('CANCEL') > -1;
          }
        });
      });
      msg.textContent = 'Status updated ✓';
      setTimeout(function(){ msg.textContent = ''; }, 2500);
      render();
    }catch(err){
      msg.textContent = 'Update failed: ' + err.message;
      sel.replaceWith(chip);
      delete chip.dataset.editing;
    }
  });
});

/* ================= BOOT ================= */
loadDeals();
setInterval(loadDeals, AUTO_REFRESH_MIN*60*1000);
</script>
